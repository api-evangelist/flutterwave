naftiko: 1.0.0-alpha2
info:
  label: Flutterwave Wallets API — Account Resolution
  description: Resolve mobile money wallet account details before initiating a transfer. 1 operation.
  tags: [Flutterwave, Wallets, Account Resolution]
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys: { FLUTTERWAVE_ACCESS_TOKEN: FLUTTERWAVE_ACCESS_TOKEN }
capability:
  consumes:
  - type: http
    namespace: wallets-account-resolution
    baseUri: https://api.flutterwave.cloud/f4b/production
    description: Flutterwave Wallet Account Resolution business capability.
    resources:
    - name: wallet-account-resolve
      path: /wallet-account/resolve
      operations:
      - name: resolvewalletaccount
        method: POST
        description: Flutterwave Wallet Account Look Up
        outputRawFormat: json
        outputParameters: [{ name: result, type: object, value: $. }]
        inputParameters: [{ name: body, in: body, type: object, required: true }]
    authentication: { type: bearer, value: '{{env.FLUTTERWAVE_ACCESS_TOKEN}}', placement: header }
  exposes:
  - type: rest
    namespace: wallets-account-resolution-rest
    port: 8080
    description: REST adapter for Flutterwave Wallet Account Resolution.
    resources:
    - path: /v4/wallet-account/resolve
      name: wallet-account-resolve
      operations:
      - method: POST
        name: resolvewalletaccount
        description: Flutterwave Wallet Account Look Up
        call: wallets-account-resolution.resolvewalletaccount
        with: { body: rest.body }
        outputParameters: [{ type: object, mapping: $. }]
  - type: mcp
    namespace: wallets-account-resolution-mcp
    port: 9090
    transport: http
    description: MCP adapter for Flutterwave Wallet Account Resolution.
    tools:
    - name: flutterwave-resolve-wallet-account
      description: Flutterwave Wallet Account Look Up
      hints: { readOnly: true, destructive: false, idempotent: true }
      call: wallets-account-resolution.resolvewalletaccount
      with: { body: tools.body }
      outputParameters: [{ type: object, mapping: $. }]
