naftiko: 1.0.0-alpha2
info:
  label: Flutterwave Transfers API — Senders
  description: Flutterwave Transfer Senders lifecycle (KYC originators of cross-border payouts). 4 operations.
  tags: [Flutterwave, Transfers, Senders, KYC, Cross-Border]
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys: { FLUTTERWAVE_ACCESS_TOKEN: FLUTTERWAVE_ACCESS_TOKEN }
capability:
  consumes:
  - type: http
    namespace: transfers-senders
    baseUri: https://api.flutterwave.cloud/f4b/production
    description: Flutterwave Transfer Senders business capability.
    resources:
    - name: transfers-senders
      path: /transfers/senders
      operations:
      - { name: listsenders, method: GET, description: Flutterwave List Transfer Senders, outputRawFormat: json,
          outputParameters: [{ name: result, type: object, value: $. }] }
      - name: createsender
        method: POST
        description: Flutterwave Create A Transfer Sender
        outputRawFormat: json
        outputParameters: [{ name: result, type: object, value: $. }]
        inputParameters: [{ name: body, in: body, type: object, required: true }]
    - name: transfers-senders-id
      path: /transfers/senders/{id}
      operations:
      - { name: getsender, method: GET, description: Flutterwave Retrieve A Transfer Sender, outputRawFormat: json,
          outputParameters: [{ name: result, type: object, value: $. }] }
      - { name: deletesender, method: DELETE, description: Flutterwave Delete A Transfer Sender,
          outputRawFormat: json, outputParameters: [{ name: result, type: object, value: $. }] }
    authentication: { type: bearer, value: '{{env.FLUTTERWAVE_ACCESS_TOKEN}}', placement: header }
  exposes:
  - type: rest
    namespace: transfers-senders-rest
    port: 8080
    description: REST adapter for Flutterwave Transfer Senders.
    resources:
    - path: /v4/transfers/senders
      name: transfers-senders
      operations:
      - { method: GET, name: listsenders, description: Flutterwave List Transfer Senders,
          call: transfers-senders.listsenders, outputParameters: [{ type: object, mapping: $. }] }
      - method: POST
        name: createsender
        description: Flutterwave Create A Transfer Sender
        call: transfers-senders.createsender
        with: { body: rest.body }
        outputParameters: [{ type: object, mapping: $. }]
    - path: /v4/transfers/senders/{id}
      name: transfers-senders-id
      operations:
      - { method: GET, name: getsender, description: Flutterwave Retrieve A Transfer Sender,
          call: transfers-senders.getsender, outputParameters: [{ type: object, mapping: $. }] }
      - { method: DELETE, name: deletesender, description: Flutterwave Delete A Transfer Sender,
          call: transfers-senders.deletesender, outputParameters: [{ type: object, mapping: $. }] }
  - type: mcp
    namespace: transfers-senders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Flutterwave Transfer Senders.
    tools:
    - { name: flutterwave-list-senders, description: Flutterwave List Transfer Senders,
        hints: { readOnly: true, destructive: false, idempotent: true },
        call: transfers-senders.listsenders, outputParameters: [{ type: object, mapping: $. }] }
    - name: flutterwave-create-sender
      description: Flutterwave Create A Transfer Sender
      hints: { readOnly: false, destructive: false, idempotent: false }
      call: transfers-senders.createsender
      with: { body: tools.body }
      outputParameters: [{ type: object, mapping: $. }]
    - { name: flutterwave-get-sender, description: Flutterwave Retrieve A Transfer Sender,
        hints: { readOnly: true, destructive: false, idempotent: true },
        call: transfers-senders.getsender, outputParameters: [{ type: object, mapping: $. }] }
    - { name: flutterwave-delete-sender, description: Flutterwave Delete A Transfer Sender,
        hints: { readOnly: false, destructive: true, idempotent: true },
        call: transfers-senders.deletesender, outputParameters: [{ type: object, mapping: $. }] }
