naftiko: 1.0.0-alpha2
info:
  label: Flutterwave Transfers API — Rates
  description: Real-time FX rate conversion for international transfers. 2 operations.
  tags: [Flutterwave, Transfers, Rates, FX]
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys: { FLUTTERWAVE_ACCESS_TOKEN: FLUTTERWAVE_ACCESS_TOKEN }
capability:
  consumes:
  - type: http
    namespace: transfers-rates
    baseUri: https://api.flutterwave.cloud/f4b/production
    description: Flutterwave Transfer Rates business capability.
    resources:
    - name: transfers-rates
      path: /transfers/rates
      operations:
      - name: createrate
        method: POST
        description: Flutterwave Rate Conversion
        outputRawFormat: json
        outputParameters: [{ name: result, type: object, value: $. }]
        inputParameters: [{ name: body, in: body, type: object, required: true }]
    - name: transfers-rates-id
      path: /transfers/rates/{id}
      operations:
      - { name: getrate, method: GET, description: Flutterwave Fetch Converted Rate, outputRawFormat: json,
          outputParameters: [{ name: result, type: object, value: $. }] }
    authentication: { type: bearer, value: '{{env.FLUTTERWAVE_ACCESS_TOKEN}}', placement: header }
  exposes:
  - type: rest
    namespace: transfers-rates-rest
    port: 8080
    description: REST adapter for Flutterwave Transfer Rates.
    resources:
    - path: /v4/transfers/rates
      name: transfers-rates
      operations:
      - method: POST
        name: createrate
        description: Flutterwave Rate Conversion
        call: transfers-rates.createrate
        with: { body: rest.body }
        outputParameters: [{ type: object, mapping: $. }]
    - path: /v4/transfers/rates/{id}
      name: transfers-rates-id
      operations:
      - { method: GET, name: getrate, description: Flutterwave Fetch Converted Rate,
          call: transfers-rates.getrate, outputParameters: [{ type: object, mapping: $. }] }
  - type: mcp
    namespace: transfers-rates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Flutterwave Transfer Rates.
    tools:
    - name: flutterwave-create-rate
      description: Flutterwave Rate Conversion
      hints: { readOnly: false, destructive: false, idempotent: false }
      call: transfers-rates.createrate
      with: { body: tools.body }
      outputParameters: [{ type: object, mapping: $. }]
    - { name: flutterwave-get-rate, description: Flutterwave Fetch Converted Rate,
        hints: { readOnly: true, destructive: false, idempotent: true },
        call: transfers-rates.getrate, outputParameters: [{ type: object, mapping: $. }] }
