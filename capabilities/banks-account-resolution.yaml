naftiko: 1.0.0-alpha2
info:
  label: Flutterwave Banks API — Account Resolution
  description: Resolve a customer's bank account name before initiating a payout. 1 operation.
  tags: [Flutterwave, Banks, Account Resolution]
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys: { FLUTTERWAVE_ACCESS_TOKEN: FLUTTERWAVE_ACCESS_TOKEN }
capability:
  consumes:
  - type: http
    namespace: banks-account-resolution
    baseUri: https://api.flutterwave.cloud/f4b/production
    description: Flutterwave Bank Account Resolution business capability.
    resources:
    - name: bank-account-resolve
      path: /bank-account/resolve
      operations:
      - name: resolvebankaccount
        method: POST
        description: Flutterwave Bank Account Look Up
        outputRawFormat: json
        outputParameters: [{ name: result, type: object, value: $. }]
        inputParameters: [{ name: body, in: body, type: object, required: true }]
    authentication: { type: bearer, value: '{{env.FLUTTERWAVE_ACCESS_TOKEN}}', placement: header }
  exposes:
  - type: rest
    namespace: banks-account-resolution-rest
    port: 8080
    description: REST adapter for Flutterwave Bank Account Resolution.
    resources:
    - path: /v4/bank-account/resolve
      name: bank-account-resolve
      operations:
      - method: POST
        name: resolvebankaccount
        description: Flutterwave Bank Account Look Up
        call: banks-account-resolution.resolvebankaccount
        with: { body: rest.body }
        outputParameters: [{ type: object, mapping: $. }]
  - type: mcp
    namespace: banks-account-resolution-mcp
    port: 9090
    transport: http
    description: MCP adapter for Flutterwave Bank Account Resolution.
    tools:
    - name: flutterwave-resolve-bank-account
      description: Flutterwave Bank Account Look Up
      hints: { readOnly: true, destructive: false, idempotent: true }
      call: banks-account-resolution.resolvebankaccount
      with: { body: tools.body }
      outputParameters: [{ type: object, mapping: $. }]
