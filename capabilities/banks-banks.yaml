naftiko: 1.0.0-alpha2
info:
  label: Flutterwave Banks API — Banks
  description: Flutterwave bank and bank branch reference data. 2 operations.
  tags: [Flutterwave, Banks, Reference Data]
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys: { FLUTTERWAVE_ACCESS_TOKEN: FLUTTERWAVE_ACCESS_TOKEN }
capability:
  consumes:
  - type: http
    namespace: banks-banks
    baseUri: https://api.flutterwave.cloud/f4b/production
    description: Flutterwave Banks business capability.
    resources:
    - name: banks
      path: /banks
      operations:
      - { name: listbanks, method: GET, description: Flutterwave Retrieve Banks, outputRawFormat: json,
          outputParameters: [{ name: result, type: object, value: $. }] }
    - name: banks-id-branches
      path: /banks/{id}/branches
      operations:
      - { name: listbankbranches, method: GET, description: Flutterwave Retrieve Bank Branches, outputRawFormat: json,
          outputParameters: [{ name: result, type: object, value: $. }] }
    authentication: { type: bearer, value: '{{env.FLUTTERWAVE_ACCESS_TOKEN}}', placement: header }
  exposes:
  - type: rest
    namespace: banks-banks-rest
    port: 8080
    description: REST adapter for Flutterwave Banks.
    resources:
    - path: /v4/banks
      name: banks
      operations:
      - { method: GET, name: listbanks, description: Flutterwave Retrieve Banks,
          call: banks-banks.listbanks, outputParameters: [{ type: object, mapping: $. }] }
    - path: /v4/banks/{id}/branches
      name: banks-id-branches
      operations:
      - { method: GET, name: listbankbranches, description: Flutterwave Retrieve Bank Branches,
          call: banks-banks.listbankbranches, outputParameters: [{ type: object, mapping: $. }] }
  - type: mcp
    namespace: banks-banks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Flutterwave Banks.
    tools:
    - { name: flutterwave-list-banks, description: Flutterwave Retrieve Banks,
        hints: { readOnly: true, destructive: false, idempotent: true },
        call: banks-banks.listbanks, outputParameters: [{ type: object, mapping: $. }] }
    - { name: flutterwave-list-bank-branches, description: Flutterwave Retrieve Bank Branches,
        hints: { readOnly: true, destructive: false, idempotent: true },
        call: banks-banks.listbankbranches, outputParameters: [{ type: object, mapping: $. }] }
