- type: Features
  data:
  - Accept payments via cards (local + international), mobile money (M-Pesa, MTN,
    Airtel, Tigo, Vodafone, OPay), bank transfers, USSD, and QR
  - Real-time payouts to bank accounts and mobile wallets across 30+ African countries
    plus US/UK/EU/Asia corridors
  - Virtual NUBANs (Nigerian Uniform Bank Account Numbers) for pay-with-bank-transfer
    collections
  - Cross-border remittance with built-in KYC for senders and recipients
  - Real-time FX conversion via the Transfer Rates endpoints
  - Multi-currency wallets (30+ currencies) with statements and balance APIs
  - Orchestrator helpers that combine customer creation, payment method tokenisation,
    and charge in one call
  - Idempotency via `X-Idempotency-Key` (UUID) returned on retry with `X-Idempotency-Cache-Hit: true`
  - AES-256 client-side encryption for sensitive card fields with a per-request 12-character
    nonce
  - OAuth 2.0 Client Credentials with 10-minute bearer tokens issued by Keycloak IDP
  - Webhooks for `charge.completed`, transfer completion, refunds, chargebacks, and
    virtual account funding
  - Card Issuing (virtual cards) and Card Acquiring services
  - Bill Payments and KYC services
  - Settlements, refunds, chargebacks, and fee computation endpoints for finance and
    operations
  - Industry solutions for Fintechs, Banks/OFIs, Travel/Hospitality, E-commerce, Remittance,
    Telecommunications, Loan Disbursements
  - Hosted checkout via Payment Links and Standard payment flow
  - Free ecommerce tooling (Store, Invoices, Disha) for SMEs
  - Send App (consumer remittance), Swap (FX), Afritickets (event ticketing), Market
    (online marketplace), Tuition (school fees)
  - Test card and test mobile money number library for sandbox validation
  - Sandbox and production environments at `api.flutterwave.cloud/f4b/sandbox` and
    `.../production`
  - Official SDKs for Node.js, PHP, Python, Ruby, Java, .NET plus frontend SDKs for
    React, Angular, Vue, Flutter, React Native, Android, iOS, and a WordPress plugin
  sources:
  - https://developer.flutterwave.com
  - https://developer.flutterwave.com/llms.txt
  - https://flutterwave.com
  - https://github.com/Flutterwave
