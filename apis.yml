position: Producing
description: Flutterwave is a pan-African payment infrastructure company providing
  the rails for businesses to accept, send, and manage money across Africa and globally.
  The Flutterwave for Business (F4B) v4 API exposes a unified surface for collections
  (cards, mobile money, bank transfer, USSD, OPay, virtual NUBANs), payouts (bank,
  mobile money, wallet-to-wallet across 30+ countries), real-time FX conversion, settlements,
  refunds, chargebacks, multi-currency wallets, KYC, card issuing, and bill payments.
  Flutterwave is one of the most valuable African fintech companies (unicorn status)
  and processes 20M+ API calls and 500k+ payments per day.
