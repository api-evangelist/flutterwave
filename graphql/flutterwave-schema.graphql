  chargedAmount: Float
  appFee: Float
  merchantFee: Float
  currency: Currency!
  status: TransactionStatus!
  paymentType: ChargeType!
  customer: Customer
  card: CardNumber
  createdAt: DateTime!
  meta: JSON
  narration: String
  ipAddress: String
  deviceFingerprint: String
  fraudStatus: String
}

