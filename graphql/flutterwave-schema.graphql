# Flutterwave GraphQL Schema
# Conceptual mapping of the Flutterwave Payments REST API to GraphQL types.
# Flutterwave's native interface is REST; this schema supports tooling and documentation.
# Source: https://developer.flutterwave.com

scalar DateTime
scalar JSON

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum TransactionStatus {
  SUCCESSFUL
  PENDING
  FAILED
  CANCELLED
}

enum ChargeType {
  CARD
  BANK_TRANSFER
  MOBILE_MONEY
  USSD
  QR
  RECURRING
}

enum Currency {
  NGN
  GHS
  KES
  ZAR
  UGX
  TZS
  RWF
  XAF
  XOF
  USD
  GBP
  EUR
  ZMW
  XRP
  ETB
  MWK
  SLL
  BIF
  BWP
  GMD
  CDF
  TND
  MAD
  EGP
}

enum TransferStatus {
  NEW
  PENDING
  SUCCESSFUL
  FAILED
}

enum SubscriptionStatus {
  ACTIVE
  CANCELLED
}

enum PlanInterval {
  DAILY
  WEEKLY
  MONTHLY
  QUARTERLY
  YEARLY
}

enum CardBrand {
  VISA
  MASTERCARD
  VERVE
  AMEX
  DISCOVER
}

enum CardType {
  CREDIT
  DEBIT
}

enum MobileMoneyNetwork {
  MPESA
  MTN
  AIRTEL
  TIGO
  VODAFONE
  OPAY
}

enum VirtualCardStatus {
  ACTIVE
  FROZEN
  TERMINATED
}

enum VirtualAccountStatus {
  ACTIVE
  INACTIVE
}

enum WebhookEventType {
  CHARGE_COMPLETED
  TRANSFER_COMPLETED
  REFUND_COMPLETED
  CHARGEBACK_CREATED
  VIRTUAL_ACCOUNT_CREDIT
  SUBSCRIPTION_CANCELLED
}

enum RefundStatus {
  PENDING
  COMPLETED
  FAILED
}

enum BillType {
  CABLE
  INTERNET
  BETTING
  TOLL
}

enum SettlementStatus {
  PENDING
  PROCESSED
}

enum SplitType {
  PERCENTAGE
  FLAT
}

enum AuditAction {
  LOGIN
  TRANSFER_INITIATED
  CHARGE_INITIATED
  SETTINGS_CHANGED
  API_KEY_ROTATED
  WEBHOOK_CONFIGURED
}

# ─────────────────────────────────────────────
# Core Input Types
# ─────────────────────────────────────────────

input PaginationInput {
  page: Int
  perPage: Int
}

input DateRangeInput {
  from: DateTime
  to: DateTime
}

# ─────────────────────────────────────────────
# Customer
# ─────────────────────────────────────────────

type Customer {
  id: ID!
  email: String!
  name: String
  phoneNumber: String
  createdAt: DateTime!
  transactions: [Transaction!]
  subscriptions: [Subscription!]
  virtualAccounts: [VirtualAccount!]
  beneficiaries: [Beneficiary!]
  metadata: JSON
}

input CreateCustomerInput {
  email: String!
  name: String
  phoneNumber: String
  metadata: JSON
}

