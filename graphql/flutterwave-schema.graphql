# ─────────────────────────────────────────────
# Paginated Response Wrappers
# ─────────────────────────────────────────────

type PageInfo {
  page: Int!
  perPage: Int!
  total: Int!
  totalPages: Int!
}

type TransactionConnection {
  data: [Transaction!]!
  pageInfo: PageInfo!
}

type TransferConnection {
  data: [Transfer!]!
  pageInfo: PageInfo!
}

type SettlementConnection {
  data: [Settlement!]!
  pageInfo: PageInfo!
}

type RefundConnection {
  data: [Refund!]!
  pageInfo: PageInfo!
}

type AuditConnection {
  data: [Audit!]!
  pageInfo: PageInfo!
}

# ─────────────────────────────────────────────
# Query
# ─────────────────────────────────────────────

type Query {
  # Transactions
  transaction(id: ID!): Transaction
  transactions(pagination: PaginationInput, dateRange: DateRangeInput, status: TransactionStatus, currency: Currency): TransactionConnection!

  # Charges
  charge(id: ID!): Charge
  cardCharge(id: ID!): CardCharge
  bankTransfer(id: ID!): BankTransfer
  mobileMoneyCharge(id: ID!): MobileMoneyCharge
  ussdCharge(id: ID!): USSD
  qrCode(id: ID!): QRCode

  # Plans & Subscriptions
  plan(id: ID!): Plan
  plans(pagination: PaginationInput): [Plan!]!
  subscription(id: ID!): Subscription
  subscriptions(planId: ID, pagination: PaginationInput): [Subscription!]!

  # Transfers
  transfer(id: ID!): Transfer
  transfers(pagination: PaginationInput, status: TransferStatus, dateRange: DateRangeInput): TransferConnection!
  bulkTransfer(id: ID!): BulkTransfer
  disbursement(id: ID!): Disbursement

  # Customers
  customer(id: ID!): Customer
  customers(pagination: PaginationInput): [Customer!]!

  # Beneficiaries
  beneficiary(id: ID!): Beneficiary
  beneficiaries(pagination: PaginationInput): [Beneficiary!]!

  # Banks & Reference
  banks(country: String!): [Bank!]!
  mobileNetworks(country: String!): [Bank!]!
  verifyAccount(input: AccountVerificationInput!): AccountVerification!
  verifyBVN(input: BVNVerificationInput!): BVNVerification!

  # Virtual Cards
  virtualCard(id: ID!): VirtualCard
  virtualCards(pagination: PaginationInput): [VirtualCard!]!

  # Virtual Accounts
  virtualAccount(orderRef: String!): VirtualAccount
  virtualAccounts(pagination: PaginationInput): [VirtualAccount!]!

  # Settlements
  settlement(id: ID!): Settlement
  settlements(pagination: PaginationInput, dateRange: DateRangeInput, status: SettlementStatus): SettlementConnection!

  # Sub-Accounts
  subAccount(id: ID!): SubAccount
  subAccounts(pagination: PaginationInput): [SubAccount!]!

  # Refunds
  refund(id: ID!): Refund
  refunds(transactionId: ID, pagination: PaginationInput): RefundConnection!

  # Payment Links
  paymentLink(id: ID!): PaymentLink
  paymentLinks(pagination: PaginationInput): [PaymentLink!]!

  # Invoices
  invoice(id: ID!): Invoice
  invoices(pagination: PaginationInput): [Invoice!]!

  # Split Payments
  splitPayment(id: ID!): SplitPayment
  splitPayments(pagination: PaginationInput): [SplitPayment!]!

  # Bills
  bill(id: ID!): Bill
  airtime(id: ID!): Airtime
  dataBundle(id: ID!): DataBundle
  electricity(id: ID!): Electricity

  # Payout Configuration
  payoutConfiguration: PayoutConfiguration

  # Webhooks
  webhooks: [Webhook!]!

  # Audit
  auditLogs(pagination: PaginationInput, dateRange: DateRangeInput): AuditConnection!
}

# ─────────────────────────────────────────────
# Mutation
# ─────────────────────────────────────────────

type Mutation {
  # Charges
  initiateCardCharge(input: CardChargeInput!): CardCharge!
  initiateBankTransferCharge(input: BankTransferChargeInput!): BankTransfer!
  initiateMobileMoneyCharge(input: MobileMoneyChargeInput!): MobileMoneyCharge!
  initiateUSSDCharge(input: USSDChargeInput!): USSD!
  initiateQRCode(input: QRCodeChargeInput!): QRCode!
  chargeRecurring(input: RecurringPaymentInput!): RecurringPayment!

  # Plans & Subscriptions
  createPlan(input: CreatePlanInput!): Plan!
  updatePlan(id: ID!, input: CreatePlanInput!): Plan!
  deletePlan(id: ID!): Boolean!
  cancelSubscription(id: ID!): Subscription!

  # Transfers
  createTransfer(input: CreateTransferInput!): Transfer!
  createBulkTransfer(input: BulkTransferInput!): BulkTransfer!
  retryTransfer(id: ID!): Transfer!

  # Refunds
  createRefund(input: CreateRefundInput!): Refund!

  # Customers
  createCustomer(input: CreateCustomerInput!): Customer!
  updateCustomer(id: ID!, input: CreateCustomerInput!): Customer!

  # Beneficiaries
  createBeneficiary(input: CreateBeneficiaryInput!): Beneficiary!
  deleteBeneficiary(id: ID!): Boolean!

  # Virtual Cards
  createVirtualCard(input: CreateVirtualCardInput!): VirtualCard!
  fundVirtualCard(id: ID!, amount: Float!): VirtualCard!
  freezeVirtualCard(id: ID!): VirtualCard!
  unfreezeVirtualCard(id: ID!): VirtualCard!
  terminateVirtualCard(id: ID!): VirtualCard!

  # Virtual Accounts
  createVirtualAccount(input: CreateVirtualAccountInput!): VirtualAccount!

  # Sub-Accounts
  createSubAccount(input: CreateSubAccountInput!): SubAccount!
  updateSubAccount(id: ID!, input: CreateSubAccountInput!): SubAccount!
  deleteSubAccount(id: ID!): Boolean!

  # Payment Links
  createPaymentLink(input: CreatePaymentLinkInput!): PaymentLink!
  updatePaymentLink(id: ID!, input: CreatePaymentLinkInput!): PaymentLink!
  deletePaymentLink(id: ID!): Boolean!

  # Invoices
  createInvoice(input: CreateInvoiceInput!): Invoice!

  # Split Payments
  createSplitPayment(input: CreateSplitPaymentInput!): SplitPayment!
  updateSplitPayment(id: ID!, input: CreateSplitPaymentInput!): SplitPayment!
  deleteSplitPayment(id: ID!): Boolean!

  # Bills & Utilities
  payBill(input: CreateBillInput!): Bill!
  buyAirtime(input: AirtimeInput!): Airtime!
  buyDataBundle(input: DataBundleInput!): DataBundle!
  payElectricity(input: ElectricityInput!): Electricity!

  # Webhooks
  configureWebhook(input: ConfigureWebhookInput!): Webhook!

  # Payout Config
  updatePayoutConfiguration(defaultCurrency: Currency, autoSettlement: Boolean, settlementFrequency: String): PayoutConfiguration!
}
